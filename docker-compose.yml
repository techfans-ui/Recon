version: '3.8'
services:
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_HTTP_ADDR: "0.0.0.0:7700"
      MEILI_MASTER_KEY: "masterKey"
    volumes:
      - meili_data:/data.ms

  backend:
    build: ./backend
    container_name: opendata-backend
    ports:
      - "8000:8000"
    environment:
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: masterKey
    depends_on:
      - meilisearch
    command: ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  frontend:
    build: ./frontend
    container_name: opendata-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
  indexer:
    build: ./backend
    container_name: opendata-indexer
    depends_on:
      - meilisearch
    entrypoint: ["sh","-c","python scripts/index_data.py || true"]

volumes:
  meili_data:
